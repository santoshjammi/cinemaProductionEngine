  act: act_1_observation
  mood: tense_restraint
  energy: 3
  voiceover: Fear creeps in when love feels too risky.
  scene_description: John, dressed in pajamas, stands alone in the kitchen, staring at a half-empty coffee
    mug. His hand hovers over it, then pulls back as he hears Emily's soft footsteps approaching from
    behind.
  scene_description_alt: ''
  visual_cause_of_emotion: Hand hovering and pulling back
  shot_language:
    shot_size: medium
    lighting_key: warm_low_light
    lens_mm: 50
    depth_of_field: shallow
  characters_present:
  - john
  ken_burns_effect: zoom-out
