  dtype: float16
  variant: fp16
  device: mps
  resolution:
    width: 1024
    height: 576
generation:
  num_inference_steps: 30
  guidance_scale: 7.5
  num_candidates: 4
  min_clip_score: 0.3
  max_refine_rounds: 2
  candidate_seeds:
  - 42
  - 137
  - 1024
  - 7777
  refinement_seeds:
