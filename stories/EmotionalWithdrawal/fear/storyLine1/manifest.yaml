characters:
  characters:
    name: 'Characters

      John'
    role: protagonist
    anchors:
    - 'Characters

      John (35), real person with lived-in appearance, imperfect and human'
    emotional_range:
    - 'restraint: hand frozen mid-reach'
    - 'tired: heavy eyes, posture not straight'
    - 'awkward: one sleeve half-rolled, off-center'
    - 'distracted: looking away mid-thought'
    - 'delayed: emotional response 5 seconds too long'
visual_system:
  style: cinematic photorealism, 35mm film grain, muted desaturated tones
  color_palette:
    dominant: cool blue undertones
    practical_lights: warm amber
    shadows: deep but not crushed
    highlights: soft, rolled off
  texture: shallow depth of field, natural film grain, soft contrast
  negative_prompt: cartoon, anime, illustration, painting, 3d render, cgi, video game, blurry, low quality,
    distorted, deformed, disfigured, bad anatomy, extra limbs, extra fingers, watermark, signature, text,
    oversaturated, hdr, plastic skin, duplicate, cloned, overlapping subjects
