  mood: warm_nostalgic
  energy: 7
  voiceover: Once, our mornings were filled with laughter and touch.
  scene_description: John and Emily are in the kitchen, laughing as they cook breakfast together. John
    playfully splashes some milk on Emily's face, and she giggles, wiping it off.
  scene_description_alt: ''
  visual_cause_of_emotion: Laughter and playful interaction
  shot_language:
    shot_size: medium
    lighting_key: warm_low_light
