## How to use an archetype

1. **Pick the archetype** that matches the psychological territory.
2. **Read the emotion graph** to understand the energy curve.
3. **Use the beat names** (hook, contrast_memory, etc.) to populate the 11 scenes.
4. **Pick an irreversible moment seed** and adapt it to your specific story.
5. **Apply the visual motifs** to the scene descriptions.
6. **Apply the sound motifs** to the ambient SFX.
7. **Apply the narration cadence** to the voiceover.

The archetype gives you the **emotional logic**. The story gives you the **specific content**. The canonical spec (`canonical_video_spec.yaml`) gives you the **structure**. Together they produce a coherent video.

