## Example scene (canonical, from VID01)

```yaml
- id: emotional-withdrawal-08-setting-the-table
  index: 8
  title: "Setting the Table"
  beat: irreversible_moment
  act: act_2_inner_reality
  phase: almost
  duration_seconds: 12.0
  energy: 5

  emotional_state:
    primary: restrained
    secondary: yearning
    subtext: "She does not know why she stopped. The viewer recognizes this pause — it has happened to them."

  visual_symbolism:
    symbols: ["second fork", "half-set table", "untouched glass of water", "cardigan half-off shoulder"]
    imperfection: ["messy hair", "cardigan slipping", "fridge hum"]
    what_is_NOT_shown: "The argument. The collapse. The whole relationship. Just the freeze."

  camera_language:
    shot_size: medium
    movement: static
    framing: rule_of_thirds
    depth_of_field: shallow
    lens_mm: 50
    lighting_key: natural

  soundtrack_zone:
    music_zone: silent
    music_volume: 0.0
    ambient_sfx_profile: irreversible_moment
    ambient_volume: 0.42
    silence_before_seconds: 0.0
    silence_after_seconds: 3.0
    silence_instead: false

  narration:
    text: "She stopped. The second fork... she didn't know why."
    prosody_register: irreversible_moment
    vocal_fracture: true
    breath_pre_pad_ms: 400
    break_words: [stopped]
    emphasis_words: [stopped, second, fork]
    # Pipeline applies rate=-30% vol=-20% pitch=-12Hz automatically

  subtitle_emphasis:
    emphasis_words: [stopped, second, fork]
    pause_after_words: [stopped]
    phrase_pacing: true
    max_words_per_caption: 5

  transition_type:
    in_transition: fade_black
    out_transition: cut
    silence_gap_seconds: 0.0

  render_hints:
    mode: img2img_from_hero
    hero_reference: characters/wife_hero.png
    negative_prompts: [candlelit_dinner, finished_meal, romantic_framing]
    micro_behaviors: [unfinished_movements, hesitation, emotional_withdrawal]
    environmental_imperfections: [kitchen_mess, fabric_wear, signs_of_life]

  irreversible_moment: true
  pre_moment: false
  post_moment: false
  shows_duality: false
```

---

## What the pipeline does with a scene

```
scene ──────► narrative_generator (LLM) writes voiceover, scene_description
       ──────► image_generator (SDXL or img2img from hero) produces 1024x576 frame
       ──────► tts_service (edge-tts) produces WAV with prosody_register applied
       ──────► ken_burns (video_service) animates the still image
       ──────► ambient_sfx (ffmpeg synthesis) produces the beat's ambient bed
       ──────► audio_mixer mixes narration + music + ambient
       ──────► subtitle_generator (whisperx) produces word-level SRT
       ──────► subtitle_burner overlays SRT onto video (or Remotion subs)
       ──────► scene clip (final_clips/scene_NNN.mp4)
```

Every render backend implements the same interface. New providers (Flux, Kling, OpenAI) plug in by reading this schema and writing the same output format.

