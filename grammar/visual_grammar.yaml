# Visual Grammar — v1.0

> **The shared visual language of every videoGen psychological cinema video.**
>
> This file replaces the practice of "prompting" (adjective + adjective + adjective) with
> **semantic directing** (emotion + visual_symbolism + camera + soundtrack).
>
> Every scene blueprint in every project consumes this grammar. The render layer (SDXL,
> Flux, OpenAI, etc.) translates the semantic tokens into actual pixels.

---

## Why semantic directing

Most AI video failures come from the same root cause: **prompting is underspecified**.

```
# BAD (prompting)
prompt: "sad lonely man cinematic"
```

This produces random, inconsistent, low-quality output. There's no emotional logic.

```
# GOOD (semantic directing)
emotional_state: emotional_resignation
visual_symbolism: [physical_distance, low_light, downward_eye_contact]
camera: slow_push_in
soundtrack: low_piano_tension
```

The renderer translates this into a real prompt. The output is consistent, coherent, and emotionally precise.

---

## The semantic vocabulary

### Emotional states (replaces "emotion" adjectives)

| Token | Translation | Visual cause |
|-------|-------------|--------------|
| `restrained` | Holding back, frozen | "hand frozen mid-reach, jaw clenched, body rigid" |
| `numb` | No feeling, mechanical | "blank stare, slack jaw, mechanical movements" |
| `grief` | Loss, weight, frozen | "motionless, eyes open but unfocused, hand hovering" |
| `warmth` | Tenderness, closeness | "leaning on shoulder, eyes closed, peaceful smile" |
| `shame` | Hiding, small, folded | "head bowed, hunched shoulders, avoiding eye contact" |
| `exhausted` | Tired, drained | "heavy eyes, slumped posture, delayed response" |
| `yearning` | Wanting, not having | "looking at something unseen, hands open on knees" |
| `defensive` | Guarded, walled | "arms crossed, body angled away, jaw tight" |
| `resigned` | Given up, accepting | "head slightly down, hands still, no expression" |
| `wounded` | Hurt, present | "lip pressed, eyes wet but not crying, body still" |
| `interrupted` | Caught in the act | "starts a motion, stops, returns hand to where it was" |

These tokens are **rendered into image prompts** by the prompt builder. They are not used as image prompts directly.

### Visual symbolism (replaces "scene" descriptions)

| Category | Tokens |
|----------|--------|
| `physical_distance` | two figures in same frame but not touching, gap between bodies, facing same direction not eye contact |
| `low_light` | moon through curtain, single lamp, phone glow as only light, flickering bulb, shadows pooling in corner |
| `downward_eye_contact` | looking at hands, looking at floor, looking at nothing, not meeting eyes |
| `unfinished_gesture` | hand starts to reach, stops, returns; reaches for door, doesn't, reaches again; fork in hand but not placing |
| `imperfection` | wrinkled sheets, unwashed mug, dust, fingerprints, mail on counter, half-rolled sleeve |
| `parallel_suffering` | both figures alone in different rooms, mirror image of solitude, her grief mirroring his |
| `transition_object` | door not quite closed, light through curtain, phone face-down, water in glass, jacket on chair |
| `nighttime_honesty` | after midnight, single light source, can't sleep, sitting up in bed, walking through empty house |

The renderer composes 2-4 of these tokens per scene. They describe what is shown, not what is felt.

### Camera language (replaces "shot" descriptions)

| Token | Translation |
|-------|-------------|
| `slow_push_in` | "slow push-in, hand-held micro-movement" |
| `slow_pull_out` | "slow zoom out revealing isolation" |
| `static` | "locked off, the camera waits" |
| `parallax_drift` | "subject still, background moves slightly, dreamlike" |
| `through_doorway` | "shot from hallway, partial frame, voyeuristic" |
| `through_window` | "shot through glass, reflection visible" |
| `extreme_close_up` | "extreme close-up on hands" |
| `medium_distant` | "medium shot, subject in environment" |
| `asymmetric_frame` | "subject off-center, negative space dominant" |

### Lighting (replaces "lighting" descriptions)

| Token | Translation |
|-------|-------------|
| `practical_phone` | "phone screen glow as only practical light source" |
| `tungsten_warm` | "warm tungsten lamp glow" |
| `moonlight` | "moonlight through curtains" |
| `low_key` | "dramatic low-key, deep shadows" |
| `natural_shadows` | "natural window light, soft shadows" |
| `dramatic_side_light` | "single side light, deep shadow opposite, theatrical" |
| `golden_hour` | "warm golden hour (only in contrast_memory scenes)" |

### Soundtrack (replaces "music" descriptions)

| Token | Translation |
|-------|-------------|
| `low_piano_tension` | "sparse A-minor piano, sub-drone underneath, hope + warmth" |
| `dark_drone` | "low D1 drone, dissonant tritones, unease" |
| `near_silence` | "single sustained A1 note fading, room tone dominant" |
| `silence_only` | "no music, ambient only" |
| `breath_forward_ambient` | "breathing audible in mix, low ambient hum, cloth movement" |

