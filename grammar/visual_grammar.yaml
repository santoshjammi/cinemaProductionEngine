## How semantic directing works in practice

### Example 1: Before (prompting)

```
# Generate: "He stopped reaching for her first"
prompt: "sad lonely man looking away from wife, cinematic, photorealistic, lonely, blue tones, evening light"
```

This produces 4 different images on 4 runs. No consistency.

### Example 2: After (semantic directing)

```yaml
scene:
  id: emotional-withdrawal-06
  index: 6
  title: "Emotional Distance"
  emotional_state:
    primary: restrained
    secondary: yearning
  visual_symbolism: [physical_distance, downward_eye_contact, unfinished_gesture]
  camera_language:
    shot_size: medium
    movement: static
    framing: asymmetric_frame
    lighting_key: practical_phone
  soundtrack_zone:
    music_zone: act_2
    ambient_sfx_profile: internal_collapse
```

The renderer translates this into a real prompt:

> "Cinematic photorealism, 35mm film grain, photorealistic, cinematic film still, shallow depth of field. A man and woman in the same kitchen, several feet apart. He is looking down at his hands. His hand starts to reach toward her, then withdraws. Phone screen glow on his face. Unwashed mug on the counter. Cool blue undertones, deep shadows. She is in the background, slightly out of focus, not looking at him."

This is **deterministic** — the same scene blueprint always produces the same image.

---

## The rendering bridge

The prompt builder (`scripts/generate_from_yaml.py:_build_prompt`) reads the scene blueprint and translates semantic tokens into image generation prompts:

```
emotional_state.primary="restrained"
  → "hand frozen mid-reach, jaw clenched, body rigid"

visual_symbolism=["physical_distance", "downward_eye_contact"]
  → "two figures in same frame but not touching, looking at own hands, not meeting eyes"

camera_language.lighting_key="practical_phone"
  → "phone screen glow as only light source"

visual_grammar.style="cinematic photorealism"
  → "cinematic photorealism, 35mm film grain, photorealistic, cinematic still"
```

The STYLE_ANCHOR is prepended to every prompt to guarantee the visual aesthetic cannot be lost.

---

## The forbidden prompts (replaces "no" rules)

These are the **rendering-language forbidden patterns** that the prompt builder automatically includes in every negative prompt:

```
cartoon, anime, illustration, painting, drawing,
comic book, comic, graphic novel, storyboard,
2d art, line art, ink drawing, pencil sketch,
vector art, digital illustration, painted, watercolor,
cel shaded, manga, webtoon,
3d render, cgi, video game,
staged, perfect, smooth, airbrushed, digital art, concept art, clean, polished,
perfectly styled hair, flawless skin, magazine cover pose,
idealized portrait, studio lighting, beauty shot,
attractive couple, romantic framing, candlelit dinner,
flawless composition
```

These are the visual antipatterns. Every videoGen video rejects them.

---

## How to add a new semantic token

1. **Identify a recurring visual need** (e.g. "we keep needing a 'couple in same bed but apart' shot")
2. **Name the token** (e.g. `parallel_sleeping_distance`)
3. **Write the translation** ("two bodies in the same bed, facing the ceiling, not touching, gap of white sheet between")
4. **Add to this file** under the appropriate category
5. **Use it in scene blueprints**
6. **The render layer picks it up automatically**

