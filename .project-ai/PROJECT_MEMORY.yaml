# Project Memory - Movie OS Cinema Production Engine

## Core Architecture
- Production-First Architecture: System centered around Production (not video)
- Grammar-Driven System: Every production selects a Production Grammar
- Capability-Driven Architecture: Every capability has an interface, Providers implement capabilities  
- Configuration-First Approach: Everything lives in configuration files
- Screenplay as Canonical Creative Artifact: Structured Markdown with YAML frontmatter

## Permanent Decisions & Developer Preferences
- **Local-First AI Development**: The primary path for further development is using local LLM engines (Ollama/LMStudio with Qwen2.5-Coder-32B and Deepseek-Coder-v2). All prompts, guidelines, and context generation must remain highly context-efficient and token-saving to run smoothly on local setups.

