## Color Grading

### Style
- **desaturated_warm** as base, shifted toward brighter/more saturated for kids content
- Soft gold highlights throughout
- Gentle contrast (never harsh)
- Slightly lifted blacks for softer look

### Progression
| Act | Color Treatment | Mood |
|-----|----------------|------|
| Hook (Act 1) | Bright, warm, saturated | Wonder, excitement |
| Plot (Act 2) | Varied, slightly desaturated during challenges | Adventure, tension (mild) |
| Climax (Act 3) | Return to warmth, increasing saturation | Hope, triumph |
| Resolution (Act 4) | Brightest, warmest, most saturated | Joy, satisfaction |

