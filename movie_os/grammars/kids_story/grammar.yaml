## Dialogue Rules

### Style
- Simple, clear language appropriate for target age group
- Repetition of key phrases for learning and engagement
- Characters speak in short, complete sentences
- No complex metaphors or abstract concepts
- Dialogue includes questions to engage young audience
- Moral lessons woven naturally into conversation

### Character Speech Patterns
- **Children:** Short sentences, wonder-filled, repetitive
- **Adults/Parents:** Warm, patient, explanatory but not condescending
- **Animals/Magical Beings:** Playful, rhythmic, sometimes rhyming
- **Narrator:** Gentle, storytelling voice, pauses for effect

### Prohibited
- No sarcasm or irony
- No complex wordplay
- No dialogue that could frighten young viewers
- No moralizing that feels preachy

---

## Camera Language

### Shot Types
- **Wide shots:** Establish magical/imaginative environments
- **Medium shots:** Character interactions, facial expressions
- **Close-ups:** Emotional moments, important objects, animal faces
- **Low-angle shots:** From child's perspective (eye level with children)
- **Over-the-shoulder:** Following character's point of view

### Camera Movement
- **Slow pans:** Gentle exploration of environments
- **Gentle zooms:** Emphasizing wonder or discovery
- **Static shots:** For calm, peaceful moments
- **Occasional handheld:** For playful, energetic sequences (sparingly)

### Framing
- Rule of thirds for naturalistic framing
- Centered framing for important characters/moments
- Include negative space for imagination to breathe
- Keep horizon lines level (no disorienting angles)

---

## Lighting Rules

### Primary Approach
- **Day scenes:** Bright, warm, saturated colors
- **Night scenes:** Soft blues and purples, gentle moonlight
- **Magical moments:** Warm golden glow, sparkles, light rays
- **Emotional moments:** Match mood but never too dark or scary

### Color Palette
- **Act 1 (Introduction):** Bright primary colors, warm tones
- **Act 2 (Adventure/Challenge):** Varied palette, slightly desaturated during challenges
- **Act 3 (Resolution):** Return to bright, warm colors, more saturated than Act 2

### Prohibited
- No harsh shadows or high contrast
- No dark, gloomy lighting
- No flickering or strobing effects
- No red-tinted lighting (can feel threatening)

---

## Music Rules

### Theme Structure
- **Main theme:** Catchy, memorable melody that represents the story's heart
- **Character themes:** Simple, distinctive motifs for main characters
- **Adventure theme:** Upbeat, rhythmic for journey/challenge sequences
- **Emotional theme:** Gentle, warm for tender moments
- **Resolution theme:** Triumphant but not overwhelming

### Instrumentation
- Acoustic instruments preferred (piano, guitar, strings, woodwinds)
- Light percussion for adventure sequences
- Chimes or glockenspiel for magical moments
- Avoid heavy electronic sounds
- Keep arrangements simple and uncluttered

### Intensity Guidelines
- **Introduction:** Soft to moderate (0.2-0.4)
- **Adventure/Challenge:** Moderate to energetic (0.4-0.6)
- **Emotional moments:** Soft, gentle (0.1-0.3)
- **Resolution:** Warm, uplifting (0.3-0.5)

---

## Voice Rules

### Narration Style
- Warm, storytelling voice (like a grandparent or beloved teacher)
- Clear enunciation, moderate pace
- Pauses for emphasis and reflection
- Gentle inflection, never monotone
- Age-appropriate vocabulary

### Character Voices
- Distinctive but not caricatured
- Children: Higher pitch, energetic, wonder-filled
- Adults: Warm, patient, reassuring
- Animals/Magical beings: Playful, rhythmic, slightly exaggerated but not cartoonish

### Prohibited
- No scary or menacing voice tones
- No overly dramatic vocalizations
- No fast-paced dialogue that's hard to follow
- No whispering for tension (can frighten young viewers)

---

## Transition Rules

### Scene Transitions
- **Cross-dissolve:** Most common, gentle and natural
- **Fade to white:** For magical transitions or time passage
- **Match cuts:** Connecting similar shapes/movements between scenes
- **Wipe transitions:** Occasionally for playful, storybook feel

### Pacing Between Scenes
- Allow 2-3 seconds for scene establishment
- Never rush emotional moments
- Include breathing room between high-energy sequences
- Total video should have natural rhythm: energy → calm → energy → calm

