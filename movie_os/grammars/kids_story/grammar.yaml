## Evaluation Criteria

### Story Quality (threshold: 0.75)
- [ ] Age-appropriate content and language
- [ ] Clear moral or lesson (if applicable)
- [ ] Engaging plot with wonder and imagination
- [ ] Characters are relatable and likable
- [ ] Pacing appropriate for target age group

### Visual Quality (threshold: 0.75)
- [ ] Bright, appealing visuals
- [ ] Color palette matches mood and age group
- [ ] Character designs consistent and appealing
- [ ] Environments imaginative but not overwhelming
- [ ] No frightening or disturbing imagery

### Audio Quality (threshold: 0.75)
- [ ] Narration clear and engaging
- [ ] Music appropriate for each scene's mood
- [ ] Sound effects enhance without overwhelming
- [ ] Voice acting distinctive and age-appropriate
- [ ] Audio mix balanced (no sudden loud moments)

### Educational Value (threshold: 0.70)
- [ ] Contains learning opportunity or moral lesson
- [ ] Lesson woven naturally into story (not preachy)
- [ ] Age-appropriate concepts and vocabulary
- [ ] Encourages positive values (kindness, courage, sharing, etc.)

### Safety Check (threshold: 1.0 — mandatory pass)
- [ ] No frightening or scary content
- [ ] No inappropriate language or themes
- [ ] No violent or aggressive imagery
- [ ] Positive role models throughout
- [ ] Appropriate for target age group

