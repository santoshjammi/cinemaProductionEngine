## Production Constraints

### Duration Guidelines
- **Ages 3-5:** 3-5 minutes total
- **Ages 6-8:** 5-8 minutes total
- **Ages 9-10:** 8-12 minutes total

### Scene Structure
- Maximum 8-10 scenes for younger audiences
- Clear beginning, middle, end
- Repetition of key moments for engagement
- Happy or hopeful ending required

### Character Guidelines
- 2-4 main characters maximum
- Clear hero/protagonist children can relate to
- Supporting characters should enhance story, not complicate it
- Animals/magical beings should be friendly and helpful

---

## Scene Structure Template

### Act 1: Introduction (Hook) — 20% of total duration
- Establish main character(s) and world
- Show ordinary life before adventure
- Introduce the "call to adventure" or problem
- End with decision to begin journey

### Act 2: Adventure/Challenge (Plot) — 50% of total duration
- Journey begins, new friends/enemies encountered
- Challenges that test character's qualities
- Learning moments and growth
- Midpoint: major discovery or setback
- Rising tension toward climax

### Act 3: Climax — 15% of total duration
- Final challenge or confrontation
- Character uses learned lessons to overcome obstacle
- Moment of triumph (but not too intense)
- Resolution of main conflict

### Act 4: Resolution — 15% of total duration
- Return to ordinary world, changed
- Moral/lesson made clear but not preachy
- Happy or hopeful ending
- Final memorable image or moment

