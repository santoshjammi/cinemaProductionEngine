## Production Constraints

### Duration Guidelines
- **Quick explainer:** 1-3 minutes (single concept)
- **Standard explainer:** 3-8 minutes (comprehensive explanation)
- **Deep dive:** 8-15 minutes (complex topic, multiple concepts)
- **Series episode:** 10-20 minutes (structured learning module)

### Content Guidelines
- One main concept per video (max 2-3 sub-concepts)
- Start with "why should you care" before "what is it"
- Use real-world examples and analogies
- End with clear summary and next steps
- Include visual proof for all claims

### Visual Guidelines
- Graphics must be accurate and well-designed
- Text on screen must be error-free
- Brand colors used consistently
- All diagrams labeled clearly
- No cluttered or busy compositions

---

## Scene Structure Template

### Act 1: Hook/Introduction — 15% of total duration
- Compelling question or surprising fact
- "Why should you care?" statement
- Brief overview of what will be covered
- Set expectations clearly

### Act 2: Core Concept Explanation — 40% of total duration
- Define the main concept clearly
- Break into logical steps or components
- Use analogies and real-world examples
- Visual support for every key point

### Act 3: Demonstration/Application — 30% of total duration
- Show the concept in action
- Step-by-step walkthrough
- Address common misconceptions
- Practical examples viewers can relate to

### Act 4: Summary/Conclusion — 15% of total duration
- Recap main takeaways (3 key points)
- Reinforce "why it matters"
- Clear next steps or call-to-action
- Memorable closing statement or visual

