## Color Grading

### Style
- **Clean, bright** as primary approach
- High contrast for text readability
- True-to-life colors for product demonstrations
- Consistent brand colors throughout
- Subtle glow on highlights for polish

### Progression
| Act | Color Treatment | Mood |
|-----|----------------|------|
| Introduction | Bright, clean, brand-aligned | Engagement |
| Explanation | Consistent, focused | Understanding |
| Demonstration | Bright, clear detail | Comprehension |
