## Voice Rules

### Narration
- Clear, articulate, enthusiastic voice
- Moderate pace — allows comprehension of complex concepts
- Pauses after key terms and definitions
- Tone: Enthusiastic, accessible, never condescending
- Emphasis on key terms and takeaways

### On-Screen Text Timing
- Text appears as narrator introduces it
- Text remains long enough to read twice
- Key terms highlighted when spoken
- Definitions fade in after term introduction

### Sound Design
- Subtle whooshes for transitions (not distracting)
- Click sounds for UI demonstrations
- No artificial sound effects unless clearly labeled
- Music and narration always balanced for clarity

---

## Transition Rules

### Scene Transitions
- **Hard cuts:** Most common — maintain momentum
- **Motion graphics transitions:** Animated wipes, slides between sections
- **Zoom transitions:** Zoom into next concept from previous
- **Text-based transitions:** Title cards between major sections

### Pacing Between Scenes
- Tight pacing — no wasted time
- Clear section markers (title cards, music stings)
- Summary before moving to new concepts
- Total video should feel efficient and informative

