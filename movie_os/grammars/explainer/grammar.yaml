## Evaluation Criteria

### Clarity (threshold: 0.85 — high standard for explainers)
- [ ] Core concept explained clearly and simply
- [ ] Complex ideas broken into digestible steps
- [ ] Analogies make abstract concepts concrete
- [ ] No jargon without explanation
- [ ] Key takeaways reinforced at end

### Visual Support (threshold: 0.75)
- [ ] Graphics support narration (not distract)
- [ ] Text is readable and well-timed
- [ ] Animations clarify, not decorate
- [ ] Visual hierarchy guides viewer attention

### Engagement (threshold: 0.75)
- [ ] Opening hooks viewer immediately
- [ ] Pacing maintains interest throughout
- [ ] Narration tone is enthusiastic and accessible
- [ ] No boring or repetitive sections

### Retention (threshold: 0.75)
- [ ] Key concepts reinforced multiple ways
- [ ] Summary recaps main takeaways
- [ ] Viewer could explain concept after watching
- [ ] Call-to-action clear (if applicable)

