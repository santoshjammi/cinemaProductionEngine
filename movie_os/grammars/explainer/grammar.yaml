## Camera Language

### Shot Types
- **Wide shots:** Establishing concepts, showing systems/processes
- **Medium shots:** Presenter/host explaining concepts
- **Close-ups:** Key details, text, diagrams
- **Screen captures:** For software/process demonstrations
- **Animated graphics:** Primary visual support for abstract concepts

### Camera Movement
- **Static shots:** Most common — clarity over movement
- **Slow pans:** Following text or graphics across screen
- **Zooms:** Emphasizing key points or details
- **Motion graphics:** Animated diagrams, charts, infographics

### Framing
- Rule of thirds for presenter shots
- Centered framing for text and graphics
- Clear visual hierarchy (what matters most is largest/boldest)
- Generous negative space around text elements
- Golden ratio for infographic compositions

---

## Lighting Rules

### Primary Approach
- **Studio lighting:** Clean, even, professional for presenter segments
- **Screen brightness:** Bright, clear for graphics and text
- **Natural light accents:** For lifestyle/product demonstrations
- **Consistent color temperature:** Never mix warm/cool lights

### Color Palette
- **Primary:** Clean whites, soft grays, brand-appropriate accent colors
- **Secondary:** Muted tones for backgrounds, bright for highlights
- **Accent:** One or two accent colors for emphasis (never more)
- Avoid: Clashing colors, overly saturated backgrounds

### Lighting Progression
| Act | Light Quality | Mood |
|-----|--------------|------|
| Introduction | Bright, clean, welcoming | Engagement, clarity |
| Explanation | Consistent, focused | Understanding, focus |
| Demonstration | Bright, clear detail | Comprehension |
| Summary/Conclusion | Warm, confident | Retention, confidence |

---

## Music Rules

### Theme Structure
- **Main theme:** Light, upbeat, memorable — supports learning without distraction
- **Transition music:** Short stings between sections
- **Explanation music:** Very soft, ambient — never compete with narration
- **Summary music:** Slightly more energetic — reinforce confidence

### Instrumentation
- Light acoustic instruments (guitar, piano, light percussion)
- Subtle electronic elements for modern feel
- No vocals in music (compete with narration)
- Keep arrangements simple and uncluttered
- Avoid: Heavy bass, dramatic orchestral, complex harmonies

### Intensity Guidelines
- **Introduction:** Moderate (0.3-0.4) — establish energy
- **Explanation:** Very soft (0.1-0.2) — support without competing
- **Demonstration:** Silent or very soft (0.0-0.1) — focus on process
- **Summary:** Moderate (0.3-0.4) — reinforce confidence

### Explainer Music Principles
- Music should never compete with narration clarity
- Use silence strategically for emphasis
- Transition stings should be short (2-3 seconds)
- Avoid repetitive loops that become distracting

