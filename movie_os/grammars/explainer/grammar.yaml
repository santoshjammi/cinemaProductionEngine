## Dialogue Rules

### Style
- Narration reads like a knowledgeable teacher — clear and enthusiastic
- Complex concepts broken into simple steps
- Analogies and metaphors make abstract ideas concrete
- Questions engage viewer ("Have you ever wondered...?")
- Summary statements reinforce key takeaways

### Narration Style
- Clear, articulate voice (like a great teacher)
- Moderate pace — not rushed, allows comprehension
- Varied inflection to maintain engagement
- Pauses after key concepts for processing
- Tone: Enthusiastic, accessible, never condescending

### On-Screen Text
- Key terms appear on screen when introduced
- Definitions brief and clear
- Bullet points for lists (max 3-4 per screen)
- Numbers/stats highlighted visually
- Font size large enough to read comfortably

### Prohibited
- No jargon without explanation
- No information dumps without visual support
- No condescending or patronizing tone
- No rapid-fire facts without breathing room

