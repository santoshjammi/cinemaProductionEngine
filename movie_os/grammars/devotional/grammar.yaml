## Dialogue Rules

### Style
- Sacred texts quoted with reverence and accuracy
- Narration reads like prayer or meditation guide
- Slow, deliberate pacing with pauses for reflection
- Minimal dialogue — emphasis on narration and music
- When characters speak: soft, reverent, contemplative

### Narration Style
- Warm, soothing voice (like a spiritual guide)
- Moderate to slow pace
- Pauses after sacred verses for reflection
- Gentle inflection, never dramatic or theatrical
- Volume slightly lower than standard — intimate, personal feel

### Character Speech (if applicable)
- Soft, reverent tones
- Slow, measured delivery
- No raised voices or emotional outbursts
- Dialogue feels like prayer or blessing

### Prohibited
- No dramatic or theatrical vocalizations
- No fast-paced dialogue
- No casual or conversational tone in sacred passages
- No humor in devotional content (except gentle, reverent warmth)

---

## Camera Language

### Shot Types
- **Extreme wide shots:** Sacred spaces, nature, horizons — emphasizing transcendence
- **Slow push-ins:** During prayer moments, drawing viewer into contemplation
- **Static shots:** For sacred imagery, allowing stillness and reflection
- **Close-ups:** Hands in prayer, candles, sacred objects, eyes in meditation
- **Low-angle shots:** Sacred figures, temples, mountains — emphasizing reverence

### Camera Movement
- **Very slow pans:** Contemplative exploration of sacred spaces
- **Gentle zooms:** Emphasizing spiritual moments
- **Static holds:** Extended stillness for meditation (5-10 seconds)
- **Slow tilts:** Upward toward sky/heavens, downward in reverence

### Framing
- Symmetrical framing for sacred architecture and figures
- Rule of thirds for natural landscapes
- Centered composition for spiritual focal points
- Generous negative space for contemplation
- Golden ratio compositions for aesthetic beauty

---

## Lighting Rules

### Primary Approach
- **Golden hour:** Warm, divine light — primary lighting source
- **Natural light:** Sunbeams through windows, moonlight, starlight
- **Candle/glow lighting:** For intimate devotional moments
- **Backlighting:** Silhouettes against sacred light (sunrise/sunset)

### Color Palette
- **Primary:** Warm golds, soft whites, gentle blues
- **Secondary:** Deep purples (meditation), soft greens (nature/devotion)
- **Accent:** Saffron/orange for spiritual energy, white for purity
- Avoid: Harsh whites, cold blues, saturated reds

### Lighting Progression
| Act | Light Quality | Color Temperature | Mood |
|-----|--------------|-------------------|------|
| Introduction | Soft dawn light | Warm (3500K) | Anticipation, peace |
| Devotion/Prayer | Candle/glow or golden hour | Very warm (2800-3200K) | Intimacy, reverence |
| Climax (Transcendence) | Divine light, sunbeams | Warm gold (4000K+) | Transcendence, bliss |
| Resolution | Gentle morning light | Warm (3500K) | Peace, fulfillment |

