## Evaluation Criteria

### Spiritual Accuracy (threshold: 1.0 — mandatory pass)
- [ ] Sacred texts quoted accurately and respectfully
- [ ] No misrepresentation of spiritual traditions
- [ ] Appropriate use of sacred symbols and imagery
- [ ] Consulted with tradition expert if applicable

### Emotional Impact (threshold: 0.75)
- [ ] Evokes genuine reverence and peace
- [ ] Music enhances rather than overwhelms devotion
- [ ] Visuals support spiritual message
- [ ] Pacing allows for reflection and contemplation

### Visual Quality (threshold: 0.75)
- [ ] Sacred spaces depicted respectfully and accurately
- [ ] Lighting creates reverent atmosphere
- [ ] Color palette supports spiritual mood
- [ ] No inappropriate or disrespectful imagery

### Audio Quality (threshold: 0.75)
- [ ] Narration clear, reverent, soothing
- [ ] Music appropriate to tradition and mood
- [ ] Sacred texts pronounced correctly
- [ ] Audio mix balanced for meditation

