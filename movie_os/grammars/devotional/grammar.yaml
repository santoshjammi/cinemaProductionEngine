## Music Rules

### Theme Structure
- **Main devotional theme:** Melodic, memorable, singable — the "heart" of the piece
- **Prayer theme:** Soft, meditative, repetitive (like a mantra)
- **Transcendence theme:** Expansive, ethereal, uplifting
- **Nature theme:** Gentle, flowing — for nature/devotion sequences

### Instrumentation
- Traditional instruments appropriate to tradition (sitar, flute, tabla, bells, etc.)
- Choral elements for sacred texts
- Soft strings for emotional depth
- Ambient pads for meditative atmosphere
- Nature sounds (birds, water, wind) blended subtly
- Avoid: Heavy percussion, electronic beats, dissonant harmonies

### Intensity Guidelines
- **Introduction:** Very soft (0.1-0.2) — gentle invitation
- **Devotion/Prayer:** Soft to moderate (0.2-0.4) — reverent engagement
- **Transcendence/Climax:** Moderate to warm (0.3-0.5) — emotional peak without overwhelming
- **Resolution:** Very soft (0.1-0.2) — peaceful return

### Rhythm and Tempo
- Slow to moderate tempo (60-80 BPM)
- Free rhythm for meditation sections
- Gentle, flowing rhythms for devotional songs
- Pauses between musical phrases for reflection

---

## Voice Rules

### Narration
- Warm, soothing, reverent voice
- Slow pace with deliberate pauses
- Clear enunciation of sacred texts
- Volume: intimate, personal (like whispering a secret to the heart)
- Tone: Never dramatic, always gentle and sincere

### Sacred Text Delivery
- Quote sacred verses in original language when possible
- Follow with translation/explanation in softer voice
- Pause after each verse for reflection (3-5 seconds of music/nature sounds)
- Respectful pronunciation is mandatory

### Choral/Vocal Elements
- Soft choral backing for devotional songs
- Single voice for prayer narration
- No dramatic vocal performances
- Harmony should be warm and consonant

---

## Transition Rules

### Scene Transitions
- **Fade to black:** Most common, peaceful and natural
- **Cross-dissolve:** For gentle scene changes
- **Fade to white/gold:** For transcendent moments
- **Nature transitions:** Clouds moving, water flowing, light changing

### Pacing Between Scenes
- Extended pauses between major sections (5-10 seconds of music/nature)
- Never rush spiritual moments
- Allow silence and stillness as part of the experience
- Total video should feel like a meditation journey

