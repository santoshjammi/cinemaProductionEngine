## Color Grading

### Style
- **desaturated_warm** as base, shifted toward golden/ethereal
- Soft, dreamy quality throughout
- Gentle contrast — never harsh
- Lifted blacks for softness
- Subtle glow on highlights (especially golden hour scenes)

### Progression
| Act | Color Treatment | Mood |
|-----|----------------|------|
| Introduction | Soft dawn, gentle warmth | Peace, anticipation |
| Devotion | Golden hour, candlelight glow | Reverence, intimacy |
| Climax | Divine light, ethereal gold | Transcendence, bliss |
| Resolution | Morning light, soft and clear | Peace, fulfillment |

