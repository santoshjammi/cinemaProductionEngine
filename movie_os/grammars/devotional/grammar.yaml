## Production Constraints

### Duration Guidelines
- **Short devotionals:** 3-5 minutes (daily prayer)
- **Standard devotional:** 8-12 minutes (bhajan/kirtin style)
- **Extended meditation:** 15-20 minutes (guided meditation)
- **Festival/special:** 20-30 minutes

### Content Guidelines
- Respect all sacred traditions and symbols
- No commercial or promotional content within devotional sections
- Include traditional elements appropriate to the tradition
- End with blessing or peaceful resolution

### Visual Guidelines
- Sacred spaces must be depicted accurately (consult tradition expert)
- Religious figures should be shown respectfully (follow tradition guidelines)
- Nature imagery should enhance, not distract from, spiritual message
- Avoid overly dramatic or theatrical visuals

---

## Scene Structure Template

### Act 1: Invocation/Opening — 15% of total duration
- Opening prayer or invocation
- Establish sacred space or natural setting
- Gentle musical introduction
- Set contemplative mood

### Act 2: Devotion/Teaching — 40% of total duration
- Sacred text recitation with reflection
- Spiritual teaching or story
- Devotional song/prayer
- Nature imagery supporting message

### Act 3: Climax (Transcendence) — 25% of total duration
- Peak devotional moment (prayer, song, or vision)
- Music reaches emotional peak
- Visuals expand to transcendent imagery
- Moment of spiritual connection

### Act 4: Resolution/Blessing — 20% of total duration
- Return to peaceful stillness
- Closing prayer or blessing
- Gentle musical resolution
- Final contemplative image

