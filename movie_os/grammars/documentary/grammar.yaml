## Production Constraints

### Duration Guidelines
- **Short documentary:** 10-15 minutes (web/documentary short)
- **Standard documentary:** 25-40 minutes (TV/streaming)
- **Extended documentary:** 50-90 minutes (feature-length)
- **Series episode:** 30-60 minutes

### Content Guidelines
- Verify all facts before production
- Obtain releases from all interview subjects
- Respect privacy and dignity of subjects
- Provide context for complex topics
- Include multiple perspectives on controversial issues

### Visual Guidelines
- Establish locations clearly with wide shots
- Interview backgrounds should be relevant to subject
- B-roll must support narrative, not fill time
- Use graphics/charts only when they enhance understanding

---

## Scene Structure Template

### Act 1: Introduction/Hook — 20% of total duration
- Compelling opening (question, fact, or human story)
- Establish subject and context
- Introduce key characters/experts
- Pose the central question/investigation

### Act 2: Investigation/Development — 45% of total duration
- Explore the subject through interviews and footage
- Present evidence and analysis
- Introduce complications or unexpected findings
- Build toward revelation

### Act 3: Climax (Revelation) — 20% of total duration
- Key discovery or turning point
- Emotional peak of human story
- Revelation that changes understanding
- Music reaches emotional peak

### Act 4: Resolution/Conclusion — 15% of total duration
- Answer the central question
- Show impact and consequences
- Reflect on broader implications
- End with memorable image or thought

