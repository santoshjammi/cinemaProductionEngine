## Lighting Rules

### Primary Approach
- **Natural light:** Primary source whenever possible (authenticity)
- **Practical lighting:** Existing lights in locations
- **Supplemental fill:** Subtle, never obvious
- **Golden hour:** For establishing shots and emotional moments

### Color Palette
- **Primary:** Natural, true-to-life colors
- **Secondary:** Muted tones for serious content, brighter for hopeful segments
- **Accent:** Use location's natural color palette
- Avoid: Overly saturated or stylized grading

### Lighting Progression
| Act | Light Quality | Mood |
|-----|--------------|------|
| Introduction (Hook) | Natural, establishing | Curiosity, context |
| Investigation (Plot) | Varied by location | Discovery, tension |
| Climax (Revelation) | Dramatic natural light | Revelation, impact |
| Resolution | Warm, hopeful | Understanding, hope |

---

## Music Rules

### Theme Structure
- **Main documentary theme:** Subtle, memorable, supports narrative without dominating
- **Investigation theme:** Tense, rhythmic — for research/exploration sequences
- **Emotional theme:** Gentle, reflective — for personal stories
- **Resolution theme:** Hopeful, warm — for conclusions

### Instrumentation
- Orchestral elements (strings, piano) for emotional depth
- Subtle electronic elements for investigation sequences
- World instruments appropriate to subject matter
- Minimal percussion — avoid driving rhythm
- Silence used strategically for impact

### Intensity Guidelines
- **Introduction:** Very soft (0.1-0.2) — establish mood without distraction
- **Investigation:** Soft to moderate (0.2-0.4) — support tension without overwhelming
- **Emotional moments:** Soft (0.1-0.3) — enhance without manipulating
- **Climax/Revelation:** Moderate (0.3-0.5) — peak without melodrama
- **Resolution:** Soft to moderate (0.2-0.4) — hopeful, reflective

### Documentary Music Principles
- Music should support facts, not manipulate emotion
- Avoid "Hollywood" scoring that tells viewer how to feel
- Use silence as a tool — let moments breathe
- Traditional/instrumental music appropriate to culture/subject

---

## Voice Rules

### Narration
- Clear, authoritative, conversational voice
- Moderate pace with varied inflection
- Pauses for emphasis on key facts
- Tone: Curious, investigative, respectful
- Never sensational or dramatic

### Interview Audio
- Clean, clear audio is mandatory
- Natural room tone (not dead silence)
- Subjects speak naturally, not formally
- B-roll audio layered subtly under interviews

### Sound Design
- Location sound enhances authenticity
- Ambient sounds support setting
- No artificial sound effects unless clearly labeled
- Music and narration never compete for attention

---

## Transition Rules

### Scene Transitions
- **Hard cuts:** Most common — documentary realism
- **Cross-dissolve:** For time passage or location changes
- **Match cuts:** Connecting related ideas visually
- **J-cuts/L-cuts:** Audio leads video for smooth flow

### Pacing Between Scenes
- Tight pacing for investigation sequences
- Extended pauses for emotional moments
- Never rush important revelations
- Total video should have investigative rhythm: discovery → analysis → revelation

---

## Color Grading

### Style
- **Naturalistic** as primary approach
- True-to-life colors with subtle enhancement
- Moderate contrast — not flat, not HDR-styled
- Location-appropriate color temperature
- Subtle film grain for texture (optional)

### Progression
| Act | Color Treatment | Mood |
|-----|----------------|------|
| Introduction | Natural, establishing | Context, curiosity |
| Investigation | Varied by location | Discovery, tension |
| Climax | Enhanced natural light | Revelation, impact |
| Resolution | Warm, hopeful | Understanding |

