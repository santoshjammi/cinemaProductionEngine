## Dialogue Rules

### Style
- Narration reads like expert storyteller — authoritative but conversational
- Interview subjects speak naturally (not scripted)
- Expert commentary concise and accessible
- No jargon without explanation
- Dialogue includes questions that drive narrative forward

### Narration Style
- Clear, confident voice (like a trusted guide)
- Moderate pace — not rushed, not slow
- Varied inflection to maintain engagement
- Pauses for emphasis on key facts or revelations
- Tone: Curious, investigative, respectful of subject matter

### Interview Style
- Natural conversation, not formal Q&A
- Subjects speak from personal experience
- Experts provide context and analysis
- Balance between emotional stories and factual information

### Prohibited
- No sensationalism or clickbait language
- No unverified claims presented as fact
- No biased or manipulative narration
- No dramatic reenactment dialogue that feels scripted

