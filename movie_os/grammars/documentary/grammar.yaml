## Evaluation Criteria

### Factual Accuracy (threshold: 1.0 — mandatory pass)
- [ ] All facts verified and sourced
- [ ] No misrepresentation of subjects or events
- [ ] Balanced perspective on controversial topics
- [ ] Expert consultation where applicable
- [ ] Clear distinction between fact and opinion

### Story Quality (threshold: 0.75)
- [ ] Clear narrative arc with compelling investigation
- [ ] Balance of facts and human stories
- [ ] Pacing maintains engagement throughout
- [ ] Revelation/ending feels earned, not forced

### Visual Quality (threshold: 0.75)
- [ ] Footage supports narrative and facts
- [ ] Interviews shot professionally and respectfully
- [ ] B-roll enhances understanding of subject
- [ ] No misleading imagery or editing

### Audio Quality (threshold: 0.75)
- [ ] Narration clear, authoritative, engaging
- [ ] Interview audio clean and natural
- [ ] Music supports without manipulating
- [ ] Sound design authentic to locations

