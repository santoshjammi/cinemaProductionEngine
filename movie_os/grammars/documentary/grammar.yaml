## Camera Language

### Shot Types
- **Wide shots:** Establishing locations, context, scale
- **Medium shots:** Interview subjects, key actions
- **Close-ups:** Details, evidence, emotional reactions
- **Aerial/drone shots:** Geographic context, scope
- **Handheld:** Documentary realism, behind-the-scenes feel
- **Static tripod:** Formal interviews, stable observations

### Camera Movement
- **Slow pans:** Exploring locations and environments
- **Tracking shots:** Following subjects through spaces
- **Handheld:** Documentary authenticity (use purposefully)
- **Steadicam:** Smooth movement for polished documentary feel
- **Zoom:** For emphasis on details or reactions

### Framing
- Rule of thirds for naturalistic composition
- Headroom appropriate to interview style
- Eye-level framing for interviews (respectful, equal)
- Include environmental context in interview shots
- Golden ratio for landscape/architectural shots

