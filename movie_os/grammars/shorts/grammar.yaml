## Camera Language

### Shot Types
- **Close-ups:** Primary framing — face, product, action
- **Medium shots:** For demonstrations or process shots
- **Extreme close-ups:** For emphasis on details or reactions
- **Selfie-style:** For personal/storytelling content
- **POV shots:** For "showing" experiences

### Camera Movement
- **Dynamic movement:** Constant motion keeps attention
- **Quick zooms:** Emphasize key moments
- **Whip pans:** Between topics for energy
- **Handheld:** Authentic, energetic feel
- **Speed ramps:** Slow → fast → slow for dramatic effect

### Framing (Vertical 9:16)
- Subject centered or rule of thirds vertically
- Top third: Face/eyes (hook zone)
- Middle third: Action/content
- Bottom third: Text/CTA zone
- Never waste top or bottom space

---

## Lighting Rules

### Primary Approach
- **Bright and high-contrast:** Catches attention in scroll feed
- **Ring light or softbox:** For face-focused content
- **Natural light:** When possible (authentic, free)
- **LED accents:** For aesthetic/brand content

### Color Palette
- **Primary:** Bright, saturated colors that pop on small screens
- **Secondary:** Brand colors for recognition
- **Accent:** High-contrast colors for text and CTAs
- Avoid: Muted tones (get lost in scroll feed)

### Lighting Progression
| Second | Light Quality | Purpose |
|--------|--------------|---------|
| 0-3s | Brightest, highest contrast | Hook attention |
| 3-15s | Consistent, clear | Deliver value |
| 15-end | Maintain brightness | Keep engagement |

---

## Music Rules

### Theme Structure
- **Trending audio:** Use popular sounds when relevant (algorithm boost)
- **Original music:** Upbeat, energetic, loopable
- **Transition sounds:** Whooshes, clicks for emphasis
- **Beat drops:** For reveal moments or key points

### Instrumentation
- Current trending sounds appropriate to platform
- Upbeat electronic or pop elements
- Strong beat for rhythm of cuts
- Sound effects enhance visual transitions
- Avoid: Slow ballads, ambient music, complex arrangements

### Intensity Guidelines
- **Hook (0-3s):** Maximum energy — stop the scroll
- **Body (3-end):** Consistent energy — maintain engagement
- **CTA/End:** Slight dip or pause before final CTA

### Shorts Music Principles
- First 3 seconds of audio must be compelling
- Use trending sounds when relevant (algorithm advantage)
- Beat-sync cuts to music for satisfaction
- Sound effects enhance every transition

---

## Voice Rules

### Narration
- Fast, energetic, direct
- Start mid-sentence if needed ("...and that's why you're doing it wrong")
- No "Hey guys" or "Welcome back" — waste of precious seconds
- Use power words: "secret," "hack," "never," "always," "stop," "start"

### Text-to-Speech (if applicable)
- Clear, modern TTS voice (ElevenLabs or similar)
- Natural inflection, not robotic
- Speed up slightly for energy
- Never use monotone TTS

### Sound Design
- Every cut has a sound effect (whoosh, click, pop)
- Beat drops emphasize key moments
- Ambient sounds add depth
- Music and narration always balanced — never compete

---

## Transition Rules

### Scene Transitions
- **Hard cuts:** Most common — maintain energy
- **Whip pans:** Between topics for dynamic feel
- **Zoom transitions:** Into/out of next shot
- **Text wipes:** Animated text between points
- **Beat-sync cuts:** Cuts on music beats for satisfaction

### Pacing Between Scenes
- Every 2-4 seconds: new visual or angle
- Never hold a static shot longer than 3 seconds
- Cut on movement or beat for energy
- Total video: 15-60 seconds (ideal: 20-40 seconds)

---

## Color Grading

### Style
- **High contrast, saturated:** Pops on small screens
- **Bright highlights:** Catches attention in scroll feed
- **Brand-consistent colors:** For recognition
- **Sharp details:** Small screens reveal flaws — keep it crisp

### Progression
| Second | Color Treatment | Purpose |
|--------|----------------|---------|
| 0-3s | Maximum saturation and contrast | Hook attention |
| 3-end | Consistent, bright | Maintain engagement |
| End | Slight warm shift | Positive feeling for CTA |

