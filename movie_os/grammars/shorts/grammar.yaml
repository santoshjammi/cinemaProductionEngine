## Dialogue Rules

### Style
- Hook in first 3 seconds (mandatory)
- Every sentence must earn the next second of attention
- Conversational, direct address ("You need to know...")
- No introductions — jump straight into value
- End with clear call-to-action or twist

### Narration Style
- Fast-paced but clear (150-180 words per minute)
- High energy throughout
- Pauses only for emphasis on key moments
- Tone: Direct, enthusiastic, like talking to a friend
- Use "you" and "your" constantly — make it personal

### On-Screen Text
- Key words appear as large text overlays
- Text must be readable in 1 second (scrollers don't wait)
- Bold, high-contrast fonts
- Animated text for emphasis
- Max 3-5 words per text overlay

### Prohibited
- No slow builds or gradual introductions
- No passive voice
- No filler words ("um," "like," "so")
- No longer than 60 seconds (ideal: 15-45 seconds)

