## Production Constraints

### Duration Guidelines
- **Quick tip:** 15-30 seconds
- **Standard short:** 30-45 seconds
- **Story short:** 45-60 seconds
- **Series episode:** Consistent length for brand recognition

### Content Guidelines
- One idea per short (max)
- Hook in first 3 seconds (mandatory)
- Clear CTA at end (follow, like, comment, visit link)
- Loop-friendly — end connects to beginning when possible
- Vertical format only (9:16)

### Visual Guidelines
- Bright, high-contrast visuals
- Large text overlays for key points
- Dynamic camera movement throughout
- Face-focused when possible (higher engagement)
- Brand colors used consistently

---

## Scene Structure Template

### Hook (0-3 seconds) — 5-10% of total duration
- Visual and audio hook simultaneously
- "You need to know..." or "Stop doing..." or surprising fact
- Brightest, most dynamic shot in entire video
- Text overlay reinforces hook

### Body (3-end-10s) — 75-85% of total duration
- Deliver value quickly
- Multiple cuts every 2-4 seconds
- Each point supported by visual proof
- Beat-synced transitions for energy

### CTA/End (last 5-10 seconds) — 10-15% of total duration
- Clear call-to-action (follow, like, comment, visit)
- Loop back to hook when possible
- Final frame: branded end card or question
- Leave viewer wanting more

