## Evaluation Criteria

### Hook Quality (threshold: 0.85 — critical for shorts)
- [ ] First 3 seconds stop the scroll
- [ ] Clear value proposition immediately
- [ ] Visual and audio hook aligned
- [ ] No wasted opening seconds

### Engagement (threshold: 0.75)
- [ ] Pacing maintains attention throughout
- [ ] Every shot earns its place
- [ ] No static shots longer than 3 seconds
- [ ] Beat-sync cuts for satisfaction

### Clarity (threshold: 0.75)
- [ ] Core message clear in under 10 seconds
- [ ] Text overlays support narration
- [ ] Call-to-action clear and visible
- [ ] No confusion about what's being shown

### Shareability (threshold: 0.70)
- [ ] Content worth sharing with friends
- [ ] Emotional reaction triggered (laugh, wow, "I need this")
- [ ] Relatable to target audience
- [ ] Memorable hook or twist

