## Production Constraints

### Duration Guidelines
- **Micro short:** 1-3 minutes (single moment/idea)
- **Short film:** 5-15 minutes (complete narrative arc)
- **Featurette:** 15-30 minutes (complex story, multiple arcs)
- **Series episode:** 20-40 minutes (serialized narrative)

### Content Guidelines
- One clear dramatic question driving the narrative
- Character must make active choices (not passive observer)
- Conflict must be earned, not manufactured
- Ending should surprise but feel inevitable in hindsight
- Theme emerges from story, not imposed on it

### Visual Guidelines
- Establish setting clearly with wide shots
- Close-ups for emotional moments
- Camera movement motivated by character emotion
- Never use visual effects that distract from story
- Every shot must serve narrative or character

