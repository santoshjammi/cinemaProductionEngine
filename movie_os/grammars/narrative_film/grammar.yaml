## Lighting Rules

### Primary Approach
- **Motivated lighting:** Light sources exist within the scene (windows, lamps)
- **Naturalistic:** Never obvious that lighting is "set"
- **Emotional lighting:** Light quality matches character's internal state
- **Golden hour:** For warmth, hope, or nostalgia

### Color Palette
- **Primary:** Naturalistic with subtle enhancement
- **Secondary:** Character/theme-appropriate color coding
- **Accent:** Strategic use of color for emotional emphasis
- Avoid: Overly stylized or unrealistic color grading

### Lighting Progression
| Act | Light Quality | Color Temperature | Mood |
|-----|--------------|-------------------|------|
| Hook (Act 1) | Warm, inviting | Warm (3200-4000K) | Comfort, normalcy |
| Plot (Act 2) | Varied by emotional state | Shifts with mood | Tension, discovery |
| Climax (Act 3) | Dramatic natural light | High contrast | Revelation, peak emotion |
| Resolution (Act 4) | Return to warmth or new normal | Resolves to theme color | Change, growth, acceptance |

