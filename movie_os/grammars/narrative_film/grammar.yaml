## Camera Language

### Shot Types
- **Close-ups:** Emotional moments, character reactions, intimate details
- **Medium shots:** Character interactions, dialogue exchanges
- **Wide shots:** Establishing environments, spatial relationships
- **Extreme close-ups:** Eyes, hands, objects of significance
- **Over-the-shoulder:** Dialogue perspective, point of view

### Camera Movement
- **Static:** Stability, comfort, ordinary moments
- **Slow push-in:** Growing tension, emotional weight
- **Slow pull-back:** Distance, loss, realization
- **Handheld:** Anxiety, instability (use sparingly)
- **Tracking:** Following movement, connection between characters

### Framing Principles
- Rule of thirds for naturalistic framing
- Centered framing for isolation or vulnerability moments
- Off-center framing for tension or discomfort
- Shallow depth of field for emotional focus
- Golden ratio compositions for aesthetic beauty

