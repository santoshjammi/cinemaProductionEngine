## Voice Rules

### Narration (if applicable)
- Rare in narrative film — show, don't tell
- When used: intimate, reflective voice (like memory or journal)
- Never explain what's already shown visually
- Narration adds perspective, not information

### Dialogue Delivery
- Naturalistic acting style
- Subtext over explicit emotion
- Pauses and silence as dramatic tools
- Physical performance supports vocal performance

### Sound Design
- Location sound enhances authenticity
- Ambient sounds support setting and mood
- Foley adds texture to key moments
- Music and dialogue always balanced — never compete

---

## Transition Rules

### Scene Transitions
- **Hard cuts:** Most common — maintain dramatic tension
- **Cross-dissolve:** For time passage or emotional reflection
- **Match cuts:** Connecting related ideas visually
- **Fade to black:** Major section breaks or ending
- **J-cuts/L-cuts:** Audio leads video for smooth flow

### Pacing Between Scenes
- Varies by genre and tone
- Tension scenes: Tight pacing, quick cuts
- Emotional scenes: Extended takes, breathing room
- Never rush important dramatic moments
- Total film should have natural rhythm: tension → release → tension → release

---

## Color Grading

### Style
- **Naturalistic** as primary approach with subtle enhancement
- Film-like quality (grain, contrast, color response)
- Character/theme-appropriate color palette
- Consistent grading throughout (no jarring shifts)

### Progression
| Act | Color Treatment | Mood |
|-----|----------------|------|
| Hook (Act 1) | Warm, inviting, familiar | Comfort, normalcy |
| Plot (Act 2) | Shifts with emotional journey | Tension, discovery |
| Climax (Act 3) | High contrast, dramatic | Revelation, peak emotion |
| Resolution (Act 4) | Resolves to new normal | Growth, acceptance |

