## Dialogue Rules

### Style
- Naturalistic dialogue — real people don't speak in complete essays
- Subtext over text — what's unsaid matters more than what is said
- Characters say what they can, not what they mean
- Interruptions, pauses, and incomplete sentences add realism
- Each character has a distinct voice and speech pattern

### Character Voice Guidelines
- **Protagonist:** Voice evolves with their arc (start → end)
- **Antagonist/Obstacle:** Distinct from protagonist's voice
- **Supporting characters:** Brief but distinctive speech patterns
- **Ensemble:** Each member has recognizable speech rhythm

### Dialogue Principles
- Show, don't tell — dialogue reveals character through action
- Avoid exposition dumps — information revealed naturally
- Use silence as dialogue — what characters choose NOT to say
- Conflict in every exchange (even quiet ones)
- Every line should advance plot OR reveal character

### Prohibited
- No monologues longer than 30 seconds
- No on-the-nose dialogue ("As you know, Bob...")
- No melodramatic declarations
- No dialogue that exists solely to explain the plot

