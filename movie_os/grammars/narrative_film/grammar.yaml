## Evaluation Criteria

### Story Quality (threshold: 0.75)
- [ ] Clear narrative arc with compelling conflict
- [ ] Character motivation clear and relatable
- [ ] Pacing maintains dramatic tension
- [ ] Ending feels earned, not forced
- [ ] Theme emerges naturally from story

### Character Quality (threshold: 0.75)
- [ ] Protagonist has clear arc (change over time)
- [ ] Supporting characters enhance main story
- [ ] Dialogue reveals character authentically
- [ ] Characters make active choices, not passive

### Visual Quality (threshold: 0.75)
- [ ] Cinematography supports emotional content
- [ ] Lighting creates appropriate mood
- [ ] Camera movement enhances storytelling
- [ ] Color grading consistent and purposeful

### Audio Quality (threshold: 0.75)
- [ ] Dialogue clear and naturally delivered
- [ ] Music enhances without manipulating
- [ ] Sound design authentic to setting
- [ ] Audio mix balanced for dramatic impact

