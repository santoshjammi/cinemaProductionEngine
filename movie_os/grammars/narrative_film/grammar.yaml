## Music Rules

### Theme Structure
- **Main character theme:** Represents protagonist's emotional journey
- **Relationship theme:** For connections between characters
- **Conflict theme:** Tension, obstacles, antagonism
- **Resolution theme:** Transformation, growth, acceptance

### Instrumentation
- Orchestral elements for emotional depth (strings, piano)
- Minimal percussion — avoid driving rhythm
- Solo instruments for intimate moments
- Ambient textures for atmosphere
- Silence used strategically for impact

### Intensity Guidelines
- **Introduction:** Soft to moderate (0.2-0.4) — establish mood
- **Development:** Varied by scene (0.1-0.5) — support emotion
- **Climax:** Moderate to peak (0.4-0.7) — emotional peak without overwhelming
- **Resolution:** Soft to moderate (0.2-0.4) — reflective, resolved

### Narrative Film Music Principles
- Music should enhance emotion, not dictate it
- Use silence as a tool — let moments breathe
- Character themes evolve with character arc
- Avoid "Hollywood" scoring that tells viewer exactly how to feel

