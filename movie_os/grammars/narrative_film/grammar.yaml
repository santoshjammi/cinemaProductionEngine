## Scene Structure Template

### Act 1: Setup/Hook — 20% of total duration
- Establish protagonist in their ordinary world
- Introduce the dramatic question
- Show what's at stake
- Inciting incident disrupts normalcy

### Act 2: Confrontation/Development — 50% of total duration
- Protagonist pursues goal, faces obstacles
- Stakes increase progressively
- Midpoint: major shift in understanding or situation
- Character makes active choices (not passive reactions)
- Alliances form and break

### Act 3: Climax — 20% of total duration
- Final confrontation with central conflict
- Protagonist must make ultimate choice
- Emotional peak of the story
- Dramatic question answered

### Act 4: Resolution — 10% of total duration
- Show new normal (changed from Act 1)
- Character's arc complete
- Theme resonates without being stated
- Final image lingers with viewer

