# Movie OS — Example Configuration
#
# This is a fully-commented example. Copy it to config/movie_os.yaml and
# edit to your needs. Run `python -m movie_os config validate` to check
# your edits.

version: "1.0"

# ============================================================
# Project — top-level settings
# ============================================================
project:
  name: psychological_cinema
  output_dir: output/videos
  log_level: INFO
  cache_dir: .movie_os_cache

# ============================================================
# Providers — which implementation to use per capability
# ============================================================
providers:

  # ----------------------------------------------------
  # Image generation
  # ----------------------------------------------------
  image:
    default: sdxl_local            # change to flux_comfyui when Phase 5 lands
    options:

      sdxl_local:
        label: SDXL Local (M1 Max)
        enabled: true
        cost_per_call_usd: 0.0
        settings:
          model: stabilityai/stable-diffusion-xl-base-1.0
          device: mps
          dtype: float16
          resolution_width: 1024
          resolution_height: 576
          num_inference_steps: 30
          guidance_scale: 7.5
          num_candidates: 4
          min_clip_score: 0.30

      flux_comfyui:
        label: FLUX.1 Dev via ComfyUI
        enabled: true               # Phase 5 — requires ComfyUI running on :8188
        cost_per_call_usd: 0.0
        settings:
          model: flux1-dev-fp8.safetensors   # the FLUX checkpoint to load
          comfyui_url: http://localhost:8188  # where ComfyUI is running
          # Quality mode: draft | production | high_quality
          # draft = flux-schnell (4 steps, fast)
          # production = flux-dev (20 steps, balanced) [default]
          # high_quality = flux-dev + LoRA (28 steps, best)
          quality: production
          ipadapter_strength: 0.6           # for character consistency
          lora_name: flux-film-photo-style.safetensors  # for high_quality mode
          timeout: 600.0                     # seconds, max wait per render

  # ----------------------------------------------------
  # Video generation (Image-to-Video)
  # ----------------------------------------------------
  video:
    default: svd_local
    options:
      svd_local:
        label: Stable Video Diffusion Local
        enabled: false              # Phase 4
        cost_per_call_usd: 0.0
        settings:
          model: stabilityai/stable-video-diffusion-img2vid-xt
          device: mps
          dtype: float16

  # ----------------------------------------------------
  # Voice synthesis (TTS)
  # ----------------------------------------------------
  voice:
    default: edge_tts
    options:
      edge_tts:
        label: Microsoft Edge TTS
        enabled: true
        cost_per_call_usd: 0.0
        settings:
          default_voice: en-US-GuyNeural
          default_language: en-US
          default_rate: "+0%"

  # ----------------------------------------------------
  # Music generation
  # ----------------------------------------------------
  music:
    default: procedural
    options:
      procedural:
        label: Procedural music synthesis (numpy)
        enabled: true
        cost_per_call_usd: 0.0
        settings:
          sample_rate: 44100
          default_volume: 0.3

  # ----------------------------------------------------
  # Story generation (LLM)
  # ----------------------------------------------------
  story:
    default: lmstudio
    options:
      lmstudio:
        label: LMStudio (local)
        enabled: true
        cost_per_call_usd: 0.0
        settings:
          base_url: http://localhost:1234
          api_key: sk-lm-TkM3NqaZ:CQdNsDjxGRm17O3Gg59W
          narrative_model: qwen3-coder-30b-a3b-instruct-mlx
          narrative_temperature: 0.7
          narrative_max_tokens: 4000
          refiner_model: supergemma4-26b-uncensored-mlx-v2
          refiner_temperature: 0.6
          refiner_max_tokens: 2000

  # ----------------------------------------------------
  # Translation (multi-language support)
  # ----------------------------------------------------
  translation:
    default: ""
    options: {}

  # ----------------------------------------------------
  # Research (web search, knowledge retrieval)
  # ----------------------------------------------------
  research:
    default: ""
    options: {}

# ============================================================
# Capabilities — which are enabled, budget limits
# ============================================================
capabilities:
  image:
    enabled: true
    budget_usd: 0.0               # 0 = unlimited (local models are free)
    timeout_seconds: 600
    max_retries: 3
  video:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 600
    max_retries: 3
  voice:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 300
    max_retries: 3
  music:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 300
    max_retries: 3
  story:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 600
    max_retries: 3
  translation:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 300
    max_retries: 3
  research:
    enabled: true
    budget_usd: 0.0
    timeout_seconds: 300
    max_retries: 3

# ============================================================
# Rendering — how the final video is rendered
# ============================================================
rendering:
  aspect_ratio: "16:9"
  resolution: "1280x720"
  quality: production             # draft | production | high_quality
  output_format: mp4
  video_codec: libx264
  audio_codec: aac
  video_bitrate: 5M
  audio_bitrate: 192k
  fps: 24

# ============================================================
# Pipeline — which steps to run, in what order
# ============================================================
pipeline:
  steps:
    - narrative
    - images
    - audio
    - music
    - sfx
    - mix
    - video
  skip: []                        # e.g., [audio, video] to skip TTS and final assembly
  auto_approve: false
  dry_run: false
  parallel: true
