# API Catalog - Movie OS Backend and Integrations
---
backend_endpoints:
  projects:
    - path: "/api/v1/projects"
      method: "POST"
      request_body: "ProjectCreateRequest Pydantic Model"
      response: "ProjectResponse Pydantic Model"
      description: "Initialize a new creative production project workspace."
    - path: "/api/v1/projects"
      method: "GET"
      request_body: "None"
      response: "list[ProjectResponse]"
      description: "List all active project workspaces in the directory."
    - path: "/api/v1/projects/{project_id}"
      method: "GET"
      request_body: "None"
      response: "ProjectResponse"
      description: "Retrieve metadata configuration details of a single project."
    - path: "/api/v1/projects/{project_id}"
      method: "PUT"
      request_body: "ProjectUpdateRequest"
      response: "ProjectResponse"
      description: "Update configurations or metadata parameters for a project."
    - path: "/api/v1/projects/{project_id}"
      method: "DELETE"
      request_body: "None"
      response: "JSON success/failure dict"
      description: "Remove a project and delete its workspaces from disk."
    - path: "/api/v1/projects/{project_id}/stories"
      method: "GET"
      request_body: "None"
      response: "list[StoryDetails]"
      description: "Retrieve list of all generated stories within a project."

  pipeline:
    - path: "/api/v1/pipeline/start"
      method: "POST"
      request_body: "PipelineStartRequest"
      response: "PipelineResponse"
      description: "Initiate an end-to-end video generation pipeline task."
    - path: "/api/v1/pipeline/import"
      method: "POST"
      request_body: "PipelineImportRequest"
      response: "PipelineResponse"
      description: "Import configuration parameters into a pipeline lifecycle state."
    - path: "/api/v1/pipeline/history"
      method: "GET"
      request_body: "None"
      response: "list[PipelineResponse]"
      description: "Get lists of all past pipeline run records."
    - path: "/api/v1/pipeline/{pipeline_id}"
      method: "GET"
      request_body: "None"
      response: "PipelineResponse"
      description: "Get detailed progress, status, and log messages for an executing pipeline."
    - path: "/api/v1/pipeline/{pipeline_id}/retry"
      method: "POST"
      request_body: "None"
      response: "PipelineResponse"
      description: "Restart pipeline processing from the last crashed stage."
    - path: "/api/v1/pipeline/{pipeline_id}/generate-images"
      method: "POST"
      request_body: "None"
      response: "JSON status dict"
      description: "Trigger the visual generation phase of scenes."
    - path: "/api/v1/pipeline/{pipeline_id}/images"
      method: "GET"
      request_body: "None"
      response: "JSON list of image file assets"
      description: "List all generated visual assets for this pipeline."
    - path: "/api/v1/pipeline/{pipeline_id}/image/{scene_number}"
      method: "GET"
      request_body: "None"
      response: "File binary stream (JPEG/PNG)"
      description: "Download or render the main scene visualization image."
    - path: "/api/v1/pipeline/{pipeline_id}/generate-video"
      method: "POST"
      request_body: "None"
      response: "JSON status dict"
      description: "Compile and merge media layers into final clips."
    - path: "/api/v1/pipeline/{pipeline_id}/generate-ken-burns-video"
      method: "POST"
      request_body: "None"
      response: "JSON status dict"
      description: "Execute Ken Burns pan/zoom video render on images via FFmpeg."
    - path: "/api/v1/pipeline/{pipeline_id}/generation"
      method: "GET"
      request_body: "None"
      response: "GenerationProgressResponse"
      description: "Poll current progress percentage and stage logs."
    - path: "/api/v1/pipeline/{pipeline_id}/video/{scene_number}"
      method: "GET"
      request_body: "None"
      response: "File binary stream (MP4)"
      description: "Download/view individual scene video clip."
    - path: "/api/v1/pipeline/{pipeline_id}/audio/{scene_number}"
      method: "GET"
      request_body: "None"
      response: "File binary stream (WAV/MP3)"
      description: "Download/view scene voiceover narration audio."
    - path: "/api/v1/pipeline/{pipeline_id}/final-video"
      method: "GET"
      request_body: "None"
      response: "File binary stream (MP4)"
      description: "Download the final fully compiled video clip."

external_integrations:
  ollama_api:
    base_url: "http://localhost:11434"
    endpoints:
      - path: "/api/chat"
        method: "POST"
        description: "Submit chat message history to local LLM engines (primary: qwen2.5:32b / qwen3.6:latest, fallback: deepseek-coder-v2:latest)."
      - path: "/api/generate"
        method: "POST"
        description: "Fallback prompt generator endpoint for old versions."
      - path: "/api/tags"
        method: "GET"
        description: "List currently downloaded local weights models and check engine health status."

  comfyui_api:
    base_url: "http://localhost:8188"
    endpoints:
      - path: "/prompt"
        method: "POST"
        description: "Submit active prompt workflow rendering maps."
      - path: "/history/{prompt_id}"
        method: "GET"
        description: "Retrieve generated image lists or rendering failures."
      - path: "/view"
        method: "GET"
        description: "Fetch the output image binaries."
      - path: "/ws"
        method: "Websocket"
        description: "Receive live rendering steps progress updates."
