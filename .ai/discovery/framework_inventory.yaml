# Framework Inventory - Movie OS Cinema Production Engine
---
backend_frameworks:
  - name: "FastAPI"
    language: "Python"
    version: ">=0.110.0"
    role: "REST API service layer, exposing endpoints for pipeline control, project status, and asset retrieval."
  - name: "Uvicorn"
    language: "Python"
    version: ">=0.27.1"
    role: "ASGI server running the FastAPI backend."
  - name: "Pydantic (v2)"
    language: "Python"
    version: ">=2.6.4"
    role: "Data validation and configuration schema definitions for domain models, configuration loaders, and API contracts."
  - name: "LangGraph"
    language: "Python"
    version: "UNKNOWN"  # Not explicitly pinned in requirements, imported dynamically in graph.py
    role: "Multi-agent state machine engine orchestrating flow across 26 sequential and conditional execution nodes with SQLite persistence."

frontend_frameworks:
  - name: "Next.js"
    language: "TypeScript/JavaScript"
    version: "^14.2.0"
    role: "React framework for visual user interface, client-side routing, and static page builds."
  - name: "React"
    language: "TypeScript/JavaScript"
    version: "^18.3.0"
    role: "Component-based user interface rendering library."
  - name: "Zustand"
    language: "TypeScript/JavaScript"
    version: "^4.5.0"
    role: "Lightweight state management store for frontend UI state."
  - name: "TanStack React Query"
    language: "TypeScript/JavaScript"
    version: "^5.28.0"
    role: "Server-state synchronization library for API data fetching, caching, and background updating."
  - name: "Radix UI Primitives"
    language: "TypeScript/JavaScript"
    version: "^1.0.0"  # Specific packages range from 1.0.2 to 1.0.7
    role: "Headless, accessible UI components (Dialog, Tabs, Accordion, Tooltip, Progress) styled with Tailwind."
  - name: "Tailwind CSS"
    language: "TypeScript/JavaScript"
    version: "^3.4.0"
    role: "Utility-first CSS styling framework."

machine_learning_libraries:
  - name: "PyTorch"
    language: "Python"
    version: ">=2.1.0"
    role: "Tensor computation library used for running local stable diffusion image generation (using MPS on Apple Silicon)."
  - name: "HuggingFace Diffusers"
    language: "Python"
    version: ">=0.27.0"
    role: "State-of-the-art diffusion pipeline runner for local SDXL image generation."
  - name: "Transformers"
    language: "Python"
    version: ">=4.36.0"
    role: "Text encoders and model weight utilities for diffusion models."
  - name: "Accelerate"
    language: "Python"
    version: ">=0.25.0"
    role: "Hardware acceleration tool facilitating device training/inference tasks."

audio_synthesis_libraries:
  - name: "Edge TTS"
    language: "Python"
    version: "UNKNOWN"  # Used via python-edge-tts or custom wrapping
    role: "Microsoft Edge Text-to-Speech wrapper library for character voiceovers."
  - name: "Coqui TTS"
    language: "Python"
    version: ">=0.22.0"
    role: "Advanced text-to-speech engine utilized in backend app services."

crawling_and_scraping_libraries:
  - name: "Crawl4AI"
    language: "Python"
    version: ">=0.9.0"
    role: "Automated web crawling library utilized by ResearchAgent for context collection."
  - name: "BeautifulSoup4"
    language: "Python"
    version: ">=4.12.0"
    role: "HTML scraping and content extraction."

testing_frameworks:
  - name: "pytest"
    language: "Python"
    version: ">=7.0.0"
    role: "Python test runner for core unit tests, adapter validation, and agent e2e assertions."
  - name: "Playwright"
    language: "TypeScript/JavaScript"
    version: "^1.44.0"
    role: "End-to-end browser automation framework for UI verification."
  - name: "Vitest"
    language: "TypeScript/JavaScript"
    version: "^1.5.0"
    role: "Next-generation frontend testing framework."
